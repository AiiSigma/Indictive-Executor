name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch project yang mau di-build (contoh: build/indictive-core)'
        required: false
        default: ''

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch
        id: vars
        run: |
          # Kalau ada input branch, pakai itu. Kalau tidak, pakai branch yang trigger workflow
          TARGET="${{ github.event.inputs.branch }}"
          if [ -z "$TARGET" ]; then
            TARGET="${{ github.ref_name }}"
          fi
          echo "branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Target branch: $TARGET"

      - name: Checkout project branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Verify project root
        run: |
          echo "=== Isi folder ==="
          ls -la
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            echo "Branch: ${{ steps.vars.outputs.branch }}"
            exit 1
          fi
          echo "✅ pubspec.yaml ditemukan"
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename & move APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk \
             output/app-release-$(date +'%Y%m%d-%H%M').apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Release-${{ github.run_number }}
          path: output/*.apk
          retention-days: 90
