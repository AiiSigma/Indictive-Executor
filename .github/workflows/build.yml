name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Triggered by (Telegram user ID)'
        required: false
        default: 'unknown'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          BUILD_DATE=$(date +'%Y%m%d-%H%M')
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/IndictiveCore-${BUILD_DATE}.apk
          echo "APK_NAME=IndictiveCore-${BUILD_DATE}.apk" >> $GITHUB_ENV

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
          retention-days: 7

      - name: Get APK Info
        run: |
          APK_PATH="build/app/outputs/flutter-apk/${{ env.APK_NAME }}"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "APK_SIZE=${APK_SIZE}" >> $GITHUB_ENV
          echo "Build selesai: ${{ env.APK_NAME }} (${APK_SIZE})"
