name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch project yang mau di-build (contoh: build/my-app)'
        required: false
        default: ''

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch
        id: vars
        run: |
          TARGET="${{ github.event.inputs.branch }}"
          if [ -z "$TARGET" ]; then
            TARGET="${{ github.ref_name }}"
          fi
          echo "branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Target branch: $TARGET"

      - name: Checkout project branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Verify project root
        run: |
          echo "=== Isi folder ==="
          ls -la
          echo ""
          echo "=== Struktur folder ==="
          find . -maxdepth 2 -type f | head -30
          echo ""

          if [ ! -f "pubspec.yaml" ]; then
            echo "ERROR: pubspec.yaml tidak ditemukan di branch ini!"
            echo "Branch: ${{ steps.vars.outputs.branch }}"
            echo ""
            echo "Pastikan project Flutter sudah diupload ke branch ini."
            exit 1
          fi

          echo "pubspec.yaml ditemukan:"
          cat pubspec.yaml
          echo ""

          if [ ! -d "android" ]; then
            echo "ERROR: Folder android/ tidak ditemukan!"
            echo "Build APK membutuhkan folder android/ di dalam project."
            exit 1
          fi

          echo "android/ folder ditemukan"
          echo "=== Verifikasi selesai ==="

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ╔═══════════════════════════════════════════════════════╗
      # ║  STRATEGI: Pakai LATEST STABLE Flutter                ║
      # ║  Kenapa? Karena package-package baru butuh Dart SDK   ║
      # ║  terbaru (misal ^3.8.1). Flutter terbaru punya Dart   ║
      # ║  terbaru, jadi semua package pasti kompatibel.         ║
      # ║                                                        ║
      # ║  Untuk package yang breaking (misal font_awesome),    ║
      # ║  akan di-auto-upgrade oleh `flutter pub upgrade`.       ║
      # ╚═══════════════════════════════════════════════════════╝
      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show environment info
        run: |
          echo "=== Flutter ==="
          flutter --version
          echo ""
          echo "=== Dart ==="
          dart --version
          echo ""
          echo "=== Java ==="
          java -version 2>&1 | head -1

      # ╔═══════════════════════════════════════════════════════╗
      # ║  AUTO-FIX DEPENDENCIES                                ║
      # ║  Urutan penting:                                      ║
      # ║  1. pub upgrade → naikkan semua package ke versi     ║
      # ║     yang kompatibel dengan Flutter terbaru            ║
      # ║  2. dart fix --apply → fix kode breaking changes      ║
      # ║  3. pub get → resolve final                           ║
      # ╚═══════════════════════════════════════════════════════╝
      - name: Auto-fix dependencies
        run: |
          echo "=== Step 1: flutter pub upgrade ==="
          echo "Ini akan auto-upgrade semua package ke versi terbaru"
          echo "yang kompatibel dengan Flutter $(flutter --version | head -1 | awk '{print $2}')"
          echo ""
          flutter pub upgrade 2>&1

          echo ""
          echo "=== Step 2: dart fix --apply ==="
          echo "Auto-fix kode yang breaking change karena Flutter/Dart baru"
          dart fix --apply 2>&1 || true

          echo ""
          echo "=== Step 3: flutter pub get (final resolve) ==="
          flutter pub get 2>&1

          echo ""
          echo "=== Step 4: Verifikasi dependency aman ==="
          flutter pub deps 2>&1 | head -40

          echo ""
          echo "=== Auto-fix dependencies selesai ==="

      # ╔═══════════════════════════════════════════════════════╗
      # ║  BUILD dengan auto-retry (3 percobaan)                ║
      # ╚═══════════════════════════════════════════════════════╝
      - name: Build APK (attempt 1)
        id: build1
        continue-on-error: true
        run: flutter build apk --release

      - name: Build APK (attempt 2 — clean rebuild)
        id: build2
        if: steps.build1.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "=== Build 1 gagal, coba clean rebuild ==="
          flutter clean
          flutter pub get
          flutter build apk --release 2>&1

      - name: Build APK (attempt 3 — no release)
        id: build3
        if: steps.build2.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "=== Build 2 gagal, coba tanpa --release ==="
          flutter clean
          flutter pub get
          flutter build apk 2>&1

      # Tentukan hasil build
      - name: Check build result
        id: result
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Build APK berhasil (release)!"
          elif [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Build APK berhasil (debug fallback)!"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Build APK gagal setelah 3 percobaan"
          fi

      - name: Rename & move APK
        if: steps.result.outputs.status == 'success'
        run: |
          mkdir -p output
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            cp build/app/outputs/flutter-apk/app-release.apk \
               output/app-release-$(date +'%Y%m%d-%H%M').apk
          elif [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk \
               output/app-debug-$(date +'%Y%m%d-%H%M').apk
          fi

      - name: Upload APK Artifact
        if: steps.result.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: APK-Release-${{ github.run_number }}
          path: output/*.apk
          retention-days: 90

      - name: Fail workflow if build failed
        if: steps.result.outputs.status == 'failed'
        run: |
          echo "❌ BUILD GAGAL"
          exit 1
